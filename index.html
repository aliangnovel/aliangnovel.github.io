        <p>※ 編輯區域維持上下對齊。下載時將為您自動分割成獨立的高畫質圖檔或 A4 雙面 PDF 檔。<br>※ 推薦使用200磅A式列印更有質感唷!🥰 </p>
    </div>
    
    <div class="controls-panel">
        <div class="upload-row">
            <div class="control-group">
                <label>【1】 上傳正面照片 (上)</label>
                <div class="input-action-group">
                    <input type="file" id="imageLoaderFront" accept="image/*">
                    <button class="action-btn rotate-btn" id="rotateFrontBtn">旋轉 180°</button>
                    <button class="action-btn delete-btn" id="deleteFrontBtn">刪除</button>
                </div>
            </div>
            <div class="control-group">
                <label>【2】 上傳反面照片 (下) </label>
                <div class="input-action-group">
                    <input type="file" id="imageLoaderBack" accept="image/*">
                    <button class="action-btn rotate-btn" id="rotateBackBtn">旋轉 180°</button>
                    <button class="action-btn delete-btn" id="deleteBackBtn">刪除</button>
                </div>
            </div>
        </div>
        
        <div class="history-row">
            <button class="history-btn" id="undoBtn" disabled>↩ 復原</button>
            <button class="history-btn" id="redoBtn" disabled>↪ 重做</button>
            <button class="history-btn clear-btn" id="clearBtn">🗑️ 清空重做</button>
            <button class="history-btn share-btn" id="shareBtn">✨ 分享給粉絲/朋友</button>
        </div>

        <div class="download-row">
            <button id="downloadFrontBtn">下載正面 (JPG)</button>
            <button id="downloadBackBtn">下載反面 (JPG)</button>
            <button id="downloadPdfBtn">下載雙面 (PDF)</button>
        </div>
    </div>
